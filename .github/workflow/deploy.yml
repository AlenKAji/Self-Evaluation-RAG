name: Build, Push & Deploy to AWS ECS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:      us-east-1
  ECR_REPO_NAME:   self-eval-rag
  ECS_CLUSTER:     self-eval-rag-cluster
  ECS_SERVICE:     self-eval-rag-service
  CONTAINER_NAME:  rag-app

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Lint & test Python source
  # ──────────────────────────────────────────────────────────────
  test:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install flake8

      - name: Flake8 (syntax errors + undefined names only)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to ECR
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO_NAME}:${IMAGE_TAG}"
          LATEST_URI="${ECR_REGISTRY}/${ECR_REPO_NAME}:latest"

          docker build \
            --target runtime \
            --cache-from "${LATEST_URI}" \
            -t "${IMAGE_URI}" \
            -t "${LATEST_URI}" .

          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          echo "image=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────
  # Job 3: Deploy updated image to ECS Fargate
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_CLUSTER }} \
            --query taskDefinition \
            > task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:         ${{ env.ECS_SERVICE }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
